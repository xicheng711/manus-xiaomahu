<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>小马虎 - 家庭护理记录小帮手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f0ff 0%, #fff0f5 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            padding: 40px 20px 30px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(160, 100, 200, 0.12);
            margin-bottom: 20px;
        }
        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            box-shadow: 0 4px 16px rgba(160, 100, 200, 0.25);
            margin-bottom: 16px;
        }
        .app-name {
            font-size: 28px;
            font-weight: 700;
            color: #5B3A8E;
            margin-bottom: 6px;
        }
        .app-subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #c084fc, #f472b6);
            color: white;
            font-size: 13px;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 500;
        }
        .features {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }
        .feature-card {
            background: white;
            border-radius: 18px;
            padding: 20px 24px;
            box-shadow: 0 4px 16px rgba(160, 100, 200, 0.08);
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .feature-icon {
            font-size: 32px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .feature-title {
            font-size: 16px;
            font-weight: 600;
            color: #5B3A8E;
            margin-bottom: 4px;
        }
        .feature-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        .contact-card {
            background: white;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(160, 100, 200, 0.08);
            text-align: center;
            margin-bottom: 20px;
        }
        .contact-card h3 {
            font-size: 16px;
            color: #5B3A8E;
            margin-bottom: 8px;
        }
        .contact-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        .contact-card a {
            color: #c084fc;
            text-decoration: none;
            font-weight: 500;
        }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            padding: 10px 0 20px;
        }
        .footer a {
            color: #c084fc;
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>

    <div class="container">

                </div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📄</div>
                <div>
                    <div class="feature-title">护理简报</div>
                    <div class="feature-desc">基于打卡数据，整合每日记录，生成护理参考摘要，帮助您了解家人的健康状况。</div>
                </div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">👨‍👩‍👧</div>
                <div>
                    <div class="feature-title">家庭共享</div>

                </div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📖</div>
                <div>
                    <div class="feature-title">护理日记</div>
                    <div class="feature-desc">记录点滴生活，支持语音输入，留住珍贵回忆。</div>
                </div>

        </div>

        <div class="contact-card">

            <p><a href="mailto:xicheng711@gmail.com">xicheng711@gmail.com</a></p>
        </div>

        <div class="footer">
            <p>
                <a href="/privacy.html">隐私政策</a>
                <a href="/terms.html">用户协议</a>
            </p>
            <p style="margin-top: 8px;">&copy; 2026 陈乐宁</p>
        </div>
    </div>
</body>
</html>
